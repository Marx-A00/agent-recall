name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        emacs-version: ['29.1', '29.4', '30.1']
    steps:
      - uses: actions/checkout@v4

      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}

      - name: Install dependencies
        run: |
          emacs --batch --eval "
          (progn
            (require 'package)
            (add-to-list 'package-archives '(\"melpa\" . \"https://melpa.org/packages/\") t)
            (package-initialize)
            (package-refresh-contents)
            (package-install 'package-lint)
            (package-install 'agent-shell))"

      - name: Run package-lint
        run: |
          emacs --batch --eval "
          (progn
            (require 'package)
            (add-to-list 'package-archives '(\"melpa\" . \"https://melpa.org/packages/\") t)
            (package-initialize)
            (require 'package-lint)
            (with-temp-buffer
              (insert-file-contents \"agent-recall.el\")
              (emacs-lisp-mode)
              (let ((warnings (package-lint-buffer)))
                (when warnings
                  (dolist (w warnings)
                    (message \"Line %d: %s (%s)\" (nth 0 w) (nth 2 w) (nth 3 w)))
                  (kill-emacs 1)))))"

      - name: Run checkdoc
        run: |
          emacs --batch --eval "
          (progn
            (require 'checkdoc)
            (let ((checkdoc-diagnostic-buffer \"*checkdoc*\"))
              (checkdoc-file \"agent-recall.el\")
              (when-let ((buf (get-buffer \"*checkdoc*\")))
                (with-current-buffer buf
                  (when (> (buffer-size) 0)
                    (princ (buffer-string) #'external-debugging-output)
                    (kill-emacs 1))))))"

      - name: Byte compile
        run: |
          emacs --batch --eval "
          (progn
            (require 'package)
            (add-to-list 'package-archives '(\"melpa\" . \"https://melpa.org/packages/\") t)
            (package-initialize)
            (package-refresh-contents)
            (package-install 'agent-shell)
            (setq byte-compile-error-on-warn t)
            (batch-byte-compile))" agent-recall.el
